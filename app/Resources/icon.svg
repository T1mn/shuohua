  <rect x="136" y="512" width="192" height="96" fill="#C49A6C"/>
  <rect x="520" y="512" width="288" height="96" fill="#C49A6C"/>
  <rect x="136" y="608" width="672" height="96" fill="#C49A6C"/>
  <rect x="136" y="704" width="288" height="96" fill="#C49A6C"/>
