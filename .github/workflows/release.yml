name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: bash scripts/build.sh

      - name: Package DMG
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          export VERSION="${VERSION#v}"
          bash scripts/package-dmg.sh

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          gh release create "$TAG" \
            --title "说话 $VERSION" \
            --generate-notes \
            dist/说话-${VERSION}.dmg
